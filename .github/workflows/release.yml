name: Create release on version bump

on:
  push:
    branches:
      - main
    paths:
      - version.php

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from version.php
        id: version
        run: |
          RELEASE=$(grep "\$plugin->release" version.php | sed "s/.*'\(.*\)'.*/\1/")
          echo "tag=v${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ZIP with correct folder name
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git archive --format=zip --prefix=pledge/ HEAD \
            -o pledge-${{ steps.version.outputs.release }}.zip

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: pledge-${{ steps.version.outputs.release }}.zip
